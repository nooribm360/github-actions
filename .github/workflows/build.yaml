name: Build and Deploy to Sandbox

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Java 8
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '8'
    - name: Build Mule App
      run: mvn clean package -DskipTests

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Java 8
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '8'
        
    - name: Configure Maven settings.xml
      run: |
        mkdir -p ~/.m2
        cat <<EOF > ~/.m2/settings.xml
        <settings>
          <servers>
            <server>
              <id>anypoint-exchange-v3</id>
              <username>~~~Client~~~</username>
              <password>${ANYPOINT_PLATFORM_USERNAME}~?~${ANYPOINT_PLATFORM_PASSWORD}</password>
            </server>
          </servers>
        </settings>
        EOF
      env:
        ANYPOINT_CLIENT_ID: ${{ secrets.ANYPOINT_PLATFORM_USERNAME }}
        ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_PLATFORM_PASSWORD }}

    - name: Deploy to Sandbox
      run: |
        # 1. Publish to Exchange
        mvn clean deploy mule:deploy -DskipTests --settings ~/.m2/settings.xml -Denvironment="Sandbox" -DtargetName="Cloudhub-US-East-2" -DappName="github-actions-app-004" -DmuleVersion="4.10.0" -Dreplicas="1" -DvCores="0.1"
        # 2. Deploy to CloudHub 2.0
        #mvn mule:deploy -DskipTests --settings ~/.m2/settings.xml