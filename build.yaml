name: Build and Deploy to Sandbox

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    - name: Build Mule App
      run: mvn clean package -DskipTests

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Configure Maven settings.xml
      run: |
        mkdir -p ~/.m2
        cat <<EOF > ~/.m2/settings.xml
        <settings>
          <servers>
            <server>
              <id>anypoint-exchange-v3</id>
              <username>~~~Client~~~</username>
              <password>${{ secrets.CONNECTED_APP_PASSWORD }}</password>
            </server>
          </servers>
        </settings>
        EOF

    - name: Deploy to CloudHub 2.0
      run: |
        # 1. Publish to Exchange
        mvn clean deploy -DskipTests
        # 2. Deploy to CloudHub 2.0
        mvn mule:deploy -DskipTests